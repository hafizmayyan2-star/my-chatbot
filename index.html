<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultra Voice AI Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0f1f;
    color: white;
}

header {
    background: #111827;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

#chat {
    height: 70vh;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    padding: 12px;
    margin: 10px;
    border-radius: 12px;
    max-width: 75%;
}

.user {
    background: #38bdf8;
    color: black;
    margin-left: auto;
}

.bot {
    background: #1f2937;
    margin-right: auto;
}

.input-box {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
}

button {
    margin-left: 8px;
    padding: 12px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.typing {
    font-style: italic;
    opacity: 0.6;
}
</style>

</head>

<body>

<header>🤖 Ultra Voice AI Chatbot</header>

<div id="chat"></div>

<div class="input-box">
    <input id="input" placeholder="Ask anything...">
    <button onclick="send()">Send</button>
    <button onclick="startVoice()">🎤</button>
</div>

<script>

let memory = JSON.parse(localStorage.getItem("memory")) || {};

// 🧠 BRAIN
function brain(msg) {
    msg = msg.toLowerCase();

    if(msg.includes("my name is")) {
        let name = msg.replace("my name is","").trim();
        memory.name = name;
        localStorage.setItem("memory", JSON.stringify(memory));
        return "Nice to meet you " + name + " 😊";
    }

    if(msg.includes("what is my name")) {
        return memory.name ? "Your name is " + memory.name : "I don't know your name yet 😅";
    }

    if(msg.includes("hello") || msg.includes("hi")) return "Hello 👋 " + (memory.name || "");
    if(msg.includes("how are you")) return "I am doing great 🤖";
    if(msg.includes("bye")) return "Goodbye 👋";

    // SCIENCE
    if(msg.includes("science")) return "Science 🔬 is study of nature using experiments.";
    if(msg.includes("physics")) return "Physics ⚡ studies matter, energy and force.";
    if(msg.includes("chemistry")) return "Chemistry 🧪 studies substances and reactions.";
    if(msg.includes("biology")) return "Biology 🧬 studies living organisms.";

    // GK
    if(msg.includes("capital of pakistan")) return "Islamabad 🇵🇰";
    if(msg.includes("capital of usa")) return "Washington D.C. 🇺🇸";

    // MATH
    if(msg.match(/[0-9+\-*/(). ]+/)) {
        try {
            return "Answer ➜ " + eval(msg);
        } catch {
            return "Invalid math 😅";
        }
    }

    if(msg.includes("ai")) return "AI 🤖 means Artificial Intelligence.";

    return "Hmm 🤔 I am still learning that.";
}

// 🗣 SPEAK (BOT VOICE)
function speak(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    speech.rate = 1;
    window.speechSynthesis.speak(speech);
}

// 🎤 VOICE INPUT
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("input").value = text;
        send();
    };
}

// 💬 SEND MESSAGE
function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value;
    if(text.trim() === "") return;

    chat.innerHTML += `<div class='msg user'>${text}</div>`;

    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.innerHTML = "Thinking...";
    chat.appendChild(typing);

    setTimeout(() => {
        typing.remove();
        let reply = brain(text);
        chat.innerHTML += `<div class='msg bot'>${reply}</div>`;
        speak(reply); // 🗣 voice output
        localStorage.setItem("chat", chat.innerHTML);
        chat.scrollTop = chat.scrollHeight;
    }, 700);

    input.value = "";
}

// LOAD CHAT
window.onload = function() {
    let saved = localStorage.getItem("chat");
    if(saved) document.getElementById("chat").innerHTML = saved;
};
</script>

</body>
</html>
